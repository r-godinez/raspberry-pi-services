---
# Intrusion prevention

- name: Fail2ban | Install fail2ban
  ansible.builtin.apt:
    name:
      - fail2ban
      - python3-pyinotify
    state: present
  register: fail2ban_install

- name: Fail2ban | Deploy jail.local configuration
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Fail2ban | Ensure fail2ban is enabled and running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  when: not ansible_check_mode
