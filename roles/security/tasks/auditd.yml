---
- name: Auditd | Install auditd
  ansible.builtin.apt:
    name:
      - auditd
      - audispd-plugins
    state: present
  when: auditd_enabled

- name: Auditd | Deploy audit rules
  ansible.builtin.template:
    src: audit.rules.j2
    dest: /etc/audit/rules.d/hardening.rules
    owner: root
    group: root
    mode: "0640"
  notify: Restart auditd
  when: auditd_enabled

- name: Auditd | Ensure auditd is enabled and running
  ansible.builtin.service:
    name: auditd
    state: started
    enabled: true
  when: auditd_enabled and not ansible_check_mode
