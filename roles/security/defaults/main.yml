---
# Tunable defaults — override per host/group

# UFW defaults
ufw_default_incoming: deny
ufw_default_outgoing: allow
ufw_allowed_ports:
  - { port: 22, proto: tcp, comment: "SSH" }
  - { port: 53, proto: tcp, comment: "DNS TCP" }
  - { port: 53, proto: udp, comment: "DNS UDP" }
  - { port: 80, proto: tcp, comment: "HTTP" }
  - { port: 443, proto: tcp, comment: "HTTPS" }

# Tailscale uses a subnet — allow the whole range
# Adjust this to match your Tailscale CGNAT range
tailscale_subnet: "100.64.0.0/10"

# Fail2ban defaults
fail2ban_bantime: "1h"
fail2ban_findtime: "10m"
fail2ban_maxretry: 5

# SSH hardening defaults
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_max_auth_tries: 3
ssh_allow_users: []          # Empty = allow all users. Populate to restrict.

# Automatic updates
unattended_upgrades_enabled: true
unattended_upgrades_mail: ""  # Set to email address for notifications

# Auditd
auditd_enabled: true
